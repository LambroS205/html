# Cấu hình Cache tĩnh cho Nginx (Nginx Optimization)
# Copy đoạn này vào block server { ... } của cấu hình Nginx hiện tại

location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

location ~* \.(css|js)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, must-revalidate";
    access_log off;
}

# Bật nén Gzip cho các file text-based (HTML, CSS, JS, JSON)
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
gzip_min_length 1000;
gzip_proxied any;
